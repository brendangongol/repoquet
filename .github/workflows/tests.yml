name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        shell: Rscript {0}
        run: |
          install.packages(c(
            "data.table", "arrow", "haven", "openxlsx", "readxl", "glue",
            "DBI", "duckdb", "future", "future.apply", "foreign", "testthat",
            "bit64", "digest", "jsonlite"
          ))

      - name: Run test suite
        run: Rscript tests/run_tests.R

      - name: Build package
        run: R CMD build . --no-manual --no-build-vignettes
